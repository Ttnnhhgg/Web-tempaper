<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка на ипотеку | Оформление заявки</title>
    <link rel="stylesheet" href="form11.css">
</head>
<body>

<div class="mortgage-card">
    <div class="form-container">
        <h1 class="mortgage-title">Заявка на ипотеку</h1>

        <form id="mortgageForm" action="#" method="post" novalidate>
            <div class="form-group">
                <label for="name">Имя <span class="required-star">*</span></label>
                <input type="text" id="name" name="name" autocomplete="name" required>
                <div class="error-msg" id="nameError">Пожалуйста, укажите ваше имя</div>
            </div>

            <div class="form-group">
                <label for="phone">Телефон <span class="required-star">*</span></label>
                <input type="tel" id="phone" name="phone" autocomplete="tel" required>
                <div class="error-msg" id="phoneError">Введите корректный номер телефона</div>
            </div>

            <button type="submit" class="submit-btn">Отправить</button>

            <div class="checkbox-group">
                <input type="checkbox" id="consent" name="consent" value="yes">
                <label for="consent">Я согласен с политикой обработки персональных данных</label>
            </div>

            <div class="required-note">
                <span>*</span> - обязательное поле
            </div>
        </form>
    </div>
</div>

<div id="toastMsg" class="success-toast">✓ Заявка отправлена</div>

<script src="form11.js"></script>
</body>
</html>
