<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центральный офис</title>
    <link rel="stylesheet" href="form6.css">
</head>
<body>
    <div class="main-slide">
        <div class="golden-frame">
            <div class="content">
                <div class="card-header">
                    <h1 class="office-title">Центральный офис</h1>
                    <p class="office-subtitle-line1">Вы можете обратиться к нашим</p>
                    <p class="office-subtitle-line2">менеджерам по любому вопросу</p>
                </div>

                <ul class="details-list">
                    <li class="detail-item">
                        <img src="im4.png" alt="location" class="detail-icon" width="25" height="25">
                        <span class="detail-text">г.Казань, ул.Яркая 31 Б</span>
                    </li>
                    <li class="detail-item">
                        <img src="im5.png" alt="time" class="detail-icon" width="25" height="25">
                        <span class="detail-text">Пн-Сб: с 9:00 до 18:00</span>
                    </li>
                    <li class="detail-item">
                        <img src="im6.png" alt="phone" class="detail-icon" width="25" height="25">
                        <span class="detail-text">+7 (962) 555-25-25</span>
                    </li>
                </ul>

                <div class="route-wrapper">
                    <button class="route-button" id="routeBtn">Проложить маршрут</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notificationToast" class="toast-notification">Маршрут построен: г.Казань, ул.Яркая 31 Б</div>

    <script src="form6.js"></script>
</body>
</html>
