<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Успешная отправка | Форма обратной связи</title>
    <link rel="stylesheet" href="form5.css">
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <!-- КРЕСТИК (кнопка закрытия) -->
            <button class="close-btn" id="closeBtn">×</button>
            
            <!-- Иконка галочки -->
            <div class="success-icon">
                <img src="im3.png" alt="Успешно" class="check-icon">
            </div>
            
            <!-- Заголовок ВАШ ЗАПРОС ПРИНЯТ -->
            <h1 class="success-title">ВАШ ЗАПРОС ПРИНЯТ</h1>
            
            <!-- Подзаголовок -->
            <p class="success-subtitle">
                Наш менеджер свяжется с вами<br>
                в ближайшее время
            </p>
        </div>
    </div>

    <script src="form5.js"></script>
</body>
</html>
