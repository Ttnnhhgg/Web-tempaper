<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рассчитать стоимость | Калькулятор проекта</title>
    <link rel="stylesheet" href="form9.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="form-card">
            <!-- Картинка 550x286 (скрывается на экранах <= 587px) -->
            <picture>
                <source media="(max-width: 587px)" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                <img src="im9.png" alt="Изображение" class="form-image">
            </picture>
            
            <h1 class="form-title">Рассчитать стоимость</h1>

            <form id="costForm" class="cost-form" novalidate>
                <div class="input-group">
                    <label class="input-label" for="nameInput">
                        Имя <span class="asterisk">*</span>
                    </label>
                    <input type="text" id="nameInput" name="name" class="form-input" autocomplete="off" title="Поле ввода имени" placeholder=" ">
                    <div class="error-msg" id="nameError"></div>
                </div>

                <div class="input-group">
                    <label class="input-label" for="phoneInput">
                        Телефон <span class="asterisk">*</span>
                    </label>
                    <input type="tel" id="phoneInput" name="phone" class="form-input" autocomplete="off" title="Поле ввода телефона" placeholder=" ">
                    <div class="error-msg" id="phoneError"></div>
                </div>

                <div class="input-group">
                    <label class="input-label" for="emailInput">
                        E-mail <span class="asterisk">*</span>
                    </label>
                    <input type="email" id="emailInput" name="email" class="form-input" autocomplete="off" title="Поле ввода email" placeholder=" ">
                    <div class="error-msg" id="emailError"></div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Отправить заявку</button>

                <div class="checkbox-wrapper">
                    <label class="checkbox-label">
                        <input type="checkbox" id="consentCheck" class="consent-checkbox">
                        <span class="checkmark-custom"></span>
                        <span class="consent-text">Я согласен с политикой обработки персональных данных</span>
                    </label>
                    <div class="error-msg" id="consentError"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="form9.js"></script>
</body>
</html>
