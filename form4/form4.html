<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма обратной связи | Красные рамки</title>
    <link rel="stylesheet" href="form4.css">
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <!-- Левая колонка с картинкой -->
            <div class="form-left">
                <img src="im2.png" alt="Фото" class="form-image">
            </div>
            
            <!-- Правая колонка с формой -->
            <div class="form-right">
                <h2 class="form-title">
                    <span>Укажите контакты для</span>
                    <span>связи и напишите вопрос</span>
                </h2>
                
                <p class="form-subtitle">
                    <span>Наш менеджер свяжется с вами</span>
                    <span>в ближайшее время</span>
                </p>

                <form id="callbackForm" class="callback-form">
                    <div class="input-group">
                        <label class="input-label">Имя *</label>
                        <input type="text" id="name" name="name" class="form-input error-border" placeholder="Введите ваше имя">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Телефон *</label>
                        <input type="tel" id="phone" name="phone" class="form-input error-border" placeholder="+7 (___) ___-__-__">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Комментарий</label>
                        <textarea id="comment" name="comment" class="form-textarea error-border" placeholder="Ваш вопрос или комментарий..."></textarea>
                    </div>

                    <!-- ОТДЕЛЬНЫЙ БЛОК С СООБЩЕНИЕМ ОБ ОШИБКЕ ПЕРЕД КНОПКОЙ -->
                    <div class="global-error-wrapper" id="globalErrorWrapper">
                        <div class="global-error-message" id="globalErrorMessage">Заполните обязательное поле</div>
                    </div>

                    <div class="button-wrapper">
                        <button type="submit" class="submit-btn" id="submitBtn">Задать вопрос</button>
                    </div>

                    <div class="checkbox-wrapper">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeCheckbox" class="checkbox-input">
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-text">Я согласен с политикой обработки персональных данных</span>
                        </label>
                    </div>
                </form>

                <div id="formStatus" class="form-status"></div>
            </div>
        </div>
    </div>

    <script src="form4.js"></script>
</body>
</html>
