<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма обратной связи</title>
    <link rel="stylesheet" href="form2.css">
</head>
<body>
    <div class="form-container">
        <div class="contact-card">
            <div class="image-side">
                <img src="im1.png" alt="Contact illustration" class="side-image">
            </div>
            <div class="form-side">
                <div class="card-header">
                    <h1>Свяжитесь с нами</h1>
                    <p class="subtitle-line1">Если у вас возникли вопросы, жалобы или</p>
                    <p class="subtitle-line2">предложения - воспользуйтесь формой</p>
                </div>
                
                <form id="contactForm">
                    <div class="field">
                        <label for="name">Имя *</label>
                        <input type="text" id="name" name="name" placeholder=" " title="Введите ваше имя">
                        <div class="error" id="nameError"></div>
                    </div>
                    
                    <div class="field">
                        <label for="email">Электронная почта *</label>
                        <input type="email" id="email" name="email" placeholder=" " title="Введите ваш email">
                        <div class="error" id="emailError"></div>
                    </div>
                    
                    <div class="field">
                        <label for="comment">Комментарий *</label>
                        <textarea id="comment" name="comment" rows="4" placeholder=" " title="Введите ваш комментарий"></textarea>
                        <div class="error" id="commentError"></div>
                    </div>
                    
                    <div class="btn-wrapper">
                        <button type="submit" class="submit-btn">Отправить</button>
                    </div>
                    
                    <div class="consent">
                        <input type="checkbox" id="privacyCheck">
                        <label for="privacyCheck">Я согласен с политикой обработки персональных данных</label>
                        <div class="error" id="consentError"></div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="form2.js"></script>
</body>
</html>
